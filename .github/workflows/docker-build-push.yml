name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "slug=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ steps.slug.outputs.slug }}
          # Skip cache on tag pushes — GHA cache can serve stale layers
          cache-from: ${{ !startsWith(github.ref, 'refs/tags/') && format('type=gha,scope={0}', steps.slug.outputs.slug) || '' }}
          cache-to: type=gha,scope=${{ steps.slug.outputs.slug }},mode=max

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            # dev track: the installer's dev release track pulls :dev; every
            # other service publishes it from main — keep web consistent so a
            # dev-track install doesn't fail with "manifest unknown".
            type=raw,value=dev,enable={{is_default_branch}}

      - name: Create multi-arch manifest
        run: |
          tags="${{ steps.meta.outputs.tags }}"
          for tag in $tags; do
            docker buildx imagetools create \
              --tag "$tag" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-linux-amd64" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-linux-arm64"
          done
